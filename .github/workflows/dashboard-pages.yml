# Publish the static dashboard to GitHub Pages.
#
# Deploys the dashboard/ folder (HTML/CSS/JS + the precomputed data/*.json baked by
# scripts/dashboard_export.py) as a static site. The dashboard auto-detects the baked
# data and runs without any Python backend.
#
# One-time setup: repo Settings -> Pages -> Build and deployment -> Source: "GitHub Actions".
# Then merge this branch to master; the site publishes at the URL shown in the run summary.
# NOTE: a GitHub Pages site is PUBLIC even from a private repo (free/Pro). The baked JSON
# holds deck names + win-probabilities (no decklists/collection). Use Netlify with access
# control if you need it private (see dashboard/README.md).
#
# Alternative (keep generated JSON out of git): run `python scripts/dashboard_export.py`
# in this job before upload — but that needs the 176 MB Scryfall bulk in CI, so committing
# the small baked JSON is simpler.
name: Deploy dashboard to Pages

on:
  push:
    branches: [master]
    paths: ["dashboard/**", ".github/workflows/dashboard-pages.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard
      - id: deployment
        uses: actions/deploy-pages@v4
